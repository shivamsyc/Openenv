version: "1.0"
environments:
  - id: "ExpenseTracker-v1"
    entry_point: "env_module:ExpenseEnv"
    description: "Expense tracking environment."
    action_space:
      type: "ExpenseAction"
      parameters:
        command: "string"
        category: "string"
        amount: "float"
    observation_space:
      type: "ExpenseObservation"
      parameters:
        message: "string"
        current_total: "float"
        success: "boolean"
    tasks:
      - id: "log_single_coffee"
        difficulty: "easy"
        goal: "Log an expense of $5.50 for 'Food'."
        max_steps: 2
